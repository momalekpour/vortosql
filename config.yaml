# NL2SQL pipeline configuration
nl2sql_pipeline:
  intent_guardrail:
    chat_completion_model_provider: openai
    chat_completion_model_name: gpt-5.4-mini
    temperature: 0

  schema_linker:
    db_file_path: data/employees.db         # required: path to SQLite file
    technique: full                            # Options: "full", "tcsl", "scsl"
    model_provider: openai                     # required for tcsl/scsl
    model_name: gpt-5.4-mini                   # required for tcsl/scsl

  example_selector:
    technique: question_similarity             # Options: "random", "question_similarity"
    number_of_examples: 3
    embedding_model_provider: openai           # required for question_similarity
    embedding_model_name: text-embedding-3-small
    random_seed: null                          # optional: integer or null

  sql_generator:
    prompt_template: zero_shot                 # Options: "zero_shot", "few_shot"
    chat_completion_model_provider: openai
    chat_completion_model_name: gpt-5.4-mini
    temperature: 0
    random_seed: null

  sql_corrector:
    max_correction_attempts: 2                 # 0 disables correction
    prompt_template: syntax_correction         # Options: "syntax_correction"
    dbms: sqlite                               # Options: "sqlite", "duckdb"
    chat_completion_model_provider: openai
    chat_completion_model_name: gpt-5.4-mini
    temperature: 0
    random_seed: null

  sql_executor:
    db_file_path: data/employees.db
    dbms: sqlite                               # Options: "sqlite", "duckdb"
